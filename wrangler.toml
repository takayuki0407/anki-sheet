# Cloudflare Pages config for anki-sheet (static site in dist/ + /api/* Functions backend).
# The backend powers the account-global book counter (Standard 10-cap across devices) and,
# later, Pro PDF sync (R2) + cross-platform progress sync. Bindings are attached on deploy.
name = "anki-sheet"
compatibility_date = "2026-06-01"
pages_build_output_dir = "dist"

# Public (non-secret) config. Firebase project id is used to validate ID tokens (aud/iss).
[vars]
FIREBASE_PROJECT_ID = "anki-sheet-b73b0"

# D1: account-global book registry, progress, tier cache. (binding -> env.DB)
[[d1_databases]]
binding = "DB"
database_name = "anki-sheet-db"
database_id = "576b11df-f300-4ead-9b61-383ae1280c89"

# R2 (PDF blobs for Pro sync). binding -> env.PDFS
[[r2_buckets]]
binding = "PDFS"
bucket_name = "anki-sheet-pdfs"
