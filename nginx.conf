server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;

  # Service worker and entry HTML must always be revalidated.
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
  location = /manifest.webmanifest {
    default_type application/manifest+json;
  }

  # ES-module worker chunk: ensure correct MIME + long immutable cache.
  location ~* \.mjs$ {
    default_type application/javascript;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Hashed build assets are immutable.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # pdf.js cMaps / fonts (served as bytes; pdf.js reads them as ArrayBuffer).
  location /pdfjs/ {
    add_header Cache-Control "public, max-age=2592000";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
