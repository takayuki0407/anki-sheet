services:
  web:
    build: .
    image: anki-sheet:latest
    container_name: anki-sheet
    ports:
      # Open http://localhost:8080 (PC) or http://<this-machine-LAN-IP>:8080 (phone
      # on the same Wi-Fi). For installable/offline PWA on mobile, serve over HTTPS.
      - "8080:80"
    restart: unless-stopped
